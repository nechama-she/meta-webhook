version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -e .
      - pip install -r requirements-dev.txt

  pre_build:
    commands:
      - echo "Running unit tests..."
      - python -m pytest tests/ -v

  build:
    commands:
      - echo "Building with SAM..."
      - sam build
      
  post_build:
    commands:
      - echo "Branch name is $BRANCH_NAME"
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          echo "Deploying to PRODUCTION"
          sam deploy --config-env prod --no-confirm-changeset
        elif [ "$BRANCH_NAME" = "dev" ]; then
          echo "DEV branch - tests passed, skipping deployment"
        else
          echo "Branch: $BRANCH_NAME - skipping deployment"
        fi
        
artifacts:
  files:
    - template.yaml
    - '**/*'
  name: BuildArtifact
