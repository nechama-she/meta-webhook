version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -e .
      - pip install -r requirements-dev.txt

  pre_build:
    commands:
      - echo "Running unit tests..."
      - python -m pytest tests/ -v

  build:
    commands:
      - echo "Building with SAM..."
      - sam build
      
  post_build:
    commands:
      - echo "Branch ref is $CODEBUILD_WEBHOOK_HEAD_REF"
      - echo "Source version is $CODEBUILD_SOURCE_VERSION"
      - |
        if [ "$CODEBUILD_WEBHOOK_HEAD_REF" = "refs/heads/main" ]; then
          echo "Deploying to PRODUCTION"
          sam deploy --config-env prod --no-confirm-changeset
        elif [ "$CODEBUILD_WEBHOOK_HEAD_REF" = "refs/heads/dev" ]; then
          echo "DEV branch - tests passed, skipping deployment"
        else
          echo "Branch: $CODEBUILD_WEBHOOK_HEAD_REF"
          echo "Unknown branch - skipping deployment"
        fi
        
artifacts:
  files:
    - template.yaml
    - '**/*'
  name: BuildArtifact
