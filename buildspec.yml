version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -e .
      - pip install -r requirements-dev.txt

  pre_build:
    commands:
      - echo "Running unit tests..."
      - python -m pytest tests/ -v

  build:
    commands:
      - echo "Building with SAM..."
      - sam build

  post_build:
    commands:
      - |
        if [ "$CODEBUILD_WEBHOOK_HEAD_REF" = "refs/heads/main" ]; then
          echo "Deploying to PRODUCTION"
          sam deploy --config-env prod --no-confirm-changeset
        elif [ "$CODEBUILD_WEBHOOK_HEAD_REF" = "refs/heads/dev" ]; then
          echo "DEV branch - tests passed, skipping deployment"
        else
          echo "Branch not configured"
          exit 1
        fi

artifacts:
  files:
    - template.yaml
    - '**/*'
  name: BuildArtifact