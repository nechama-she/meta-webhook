AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:

  # ── Shared Lambda Layer ────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: meta-webhook-shared
      ContentUri: src/libs/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  # ── Webhook function ───────────────────────────────────────────────
  MetaWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meta_webhook
      CodeUri: src/webhook/
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref SharedLayer
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: '*'
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          APP_SECRET: '{{resolve:ssm:/meta-webhook/APP_SECRET}}'
          COMMENTS_DETECTION_USER_TOKEN: '{{resolve:ssm:/meta-webhook/COMMENTS_DETECTION_USER_TOKEN}}'
          ENABLE_OPENAI_ANSWER: '{{resolve:ssm:/meta-webhook/ENABLE_OPENAI_ANSWER}}'
          OPENAI_API_KEY: '{{resolve:ssm:/meta-webhook/OPENAI_API_KEY}}'
          VERIFY_TOKEN: '{{resolve:ssm:/meta-webhook/VERIFY_TOKEN}}'

  # ── Lead polling (pull-based) ──────────────────────────────────────

  LeadPollDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: meta-webhook-lead-poll-dlq
      MessageRetentionPeriod: 1209600   # 14 days

  LeadPollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meta_webhook_lead_poll
      CodeUri: src/poll/
      Handler: lead_poll_function.lead_poll_handler
      Runtime: python3.12
      Timeout: 120
      MemorySize: 256
      Layers:
        - !Ref SharedLayer
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: '*'
        - SQSSendMessagePolicy:
            QueueName: !GetAtt LeadPollDLQ.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/GOOGLE_SHEETS_CREDENTIALS'
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt LeadPollDLQ.Arn
      Environment:
        Variables:
          APP_SECRET: '{{resolve:ssm:/meta-webhook/APP_SECRET}}'
          COMMENTS_DETECTION_USER_TOKEN: '{{resolve:ssm:/meta-webhook/COMMENTS_DETECTION_USER_TOKEN}}'
          OPENAI_API_KEY: '{{resolve:ssm:/meta-webhook/OPENAI_API_KEY}}'
          PAGE_IDS: '{{resolve:ssm:/meta-webhook/PAGE_IDS}}'
          LEAD_POLL_LOOKBACK_MINUTES: '30'
          SMARTMOVING_PROVIDER_KEY: '{{resolve:ssm:/meta-webhook/SMARTMOVING_PROVIDER_KEY}}'
          SMARTMOVING_GORILLA_BRANCH_ID: '{{resolve:ssm:/meta-webhook/SMARTMOVING_GORILLA_BRANCH_ID}}'
          SMARTMOVING_WILSON_BRANCH_ID: '{{resolve:ssm:/meta-webhook/SMARTMOVING_WILSON_BRANCH_ID}}'
          HHG_NOTIFY_FROM: '{{resolve:ssm:/meta-webhook/HHG_NOTIFY_FROM}}'
          HHG_NOTIFY_TO: '{{resolve:ssm:/meta-webhook/HHG_NOTIFY_TO}}'
          GRANOT_API_ID: '{{resolve:ssm:/meta-webhook/GRANOT_API_ID}}'
          GRANOT_MOVER_REF: '{{resolve:ssm:/meta-webhook/GRANOT_MOVER_REF}}'
          BORAT_LEADS_SPREADSHEET_ID: '{{resolve:ssm:/meta-webhook/BORAT_LEADS_SPREADSHEET_ID}}'
      Events:
        LeadPollSchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(30 minutes)
            State: ENABLED
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 900

  LeadPollErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: meta-webhook-lead-poll-errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref LeadPollFunction
