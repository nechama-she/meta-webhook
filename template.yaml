AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: dev
  RdsSecretArn:
    Type: String
    Description: Secrets Manager ARN for RDS credentials
    Default: arn:aws:secretsmanager:us-east-1:381492064416:secret:rds!db-959f86c1-2259-4cd5-a7ba-84aad184418e-1CXxCC
  RdsHost:
    Type: String
    Description: RDS hostname
    Default: moving-crm-dev.cez2oc2cg2qj.us-east-1.rds.amazonaws.com
  RdsDbName:
    Type: String
    Description: RDS database name
    Default: moving_crm
  VpcSubnetIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Private subnet IDs for the Lambdas (empty = not in a VPC).
  VpcSecurityGroupIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Security group IDs for the Lambdas (must reach RDS + have egress via NAT).

Conditions:
  InVpc: !Not [!Equals [!Join ["", !Ref VpcSubnetIds], ""]]
  IsProd: !Equals [!Ref Environment, prod]

Resources:

  # ── Shared Lambda Layer ────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: meta-webhook-shared
      ContentUri: src/libs/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  # ── Webhook function ───────────────────────────────────────────────
  MetaWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meta_webhook
      CodeUri: src/webhook/
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref SharedLayer
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: '*'
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:ListTables
                - dynamodb:CreateTable
                - dynamodb:DescribeTable
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref RdsSecretArn
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
      VpcConfig: !If
        - InVpc
        - SubnetIds: !Ref VpcSubnetIds
          SecurityGroupIds: !Ref VpcSecurityGroupIds
        - !Ref "AWS::NoValue"
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          APP_ENV: !Ref Environment
          APP_SECRET: '{{resolve:ssm:/meta-webhook/APP_SECRET}}'
          COMMENTS_DETECTION_USER_TOKEN: '{{resolve:ssm:/meta-webhook/COMMENTS_DETECTION_USER_TOKEN}}'
          ENABLE_OPENAI_ANSWER: '{{resolve:ssm:/meta-webhook/ENABLE_OPENAI_ANSWER}}'
          OPENAI_API_KEY: '{{resolve:ssm:/meta-webhook/OPENAI_API_KEY}}'
          VERIFY_TOKEN: '{{resolve:ssm:/meta-webhook/VERIFY_TOKEN}}'
          AIRCALL_API_ID: '{{resolve:ssm:/meta-webhook/AIRCALL_API_ID}}'
          AIRCALL_API_TOKEN: '{{resolve:ssm:/meta-webhook/AIRCALL_API_TOKEN}}'
          SMARTMOVING_API_KEY: !Sub '{{resolve:ssm:/moving-crm/${Environment}/SMARTMOVING_API_KEY}}'
          MOVING_CRM_API_SECRET: '{{resolve:ssm:/meta-webhook/MOVING_CRM_API_SECRET}}'
          MOVING_CRM_API_BASE_URL: !Sub '{{resolve:ssm:/moving-crm/${Environment}/API_BASE_URL}}'
          MOVING_CRM_ADMIN_EMAIL: 'admin@gorillamove.com'
          MOVING_CRM_ADMIN_PASSWORD_PARAM: '/meta-webhook/MOVINGCRM_ADMIN_PASSWORD'
          CHAT_API_URL: '{{resolve:ssm:/meta-webhook/CHAT_API_URL}}'
          RDS_SECRET_ARN: !Ref RdsSecretArn
          RDS_HOST: !Ref RdsHost
          RDS_DB_NAME: !Ref RdsDbName

  # ── Lead polling (pull-based) ──────────────────────────────────────

  LeadPollDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: meta-webhook-lead-poll-dlq
      MessageRetentionPeriod: 1209600   # 14 days

  LeadPollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meta_webhook_lead_poll
      CodeUri: src/poll/
      Handler: lead_poll_function.lead_poll_handler
      Runtime: python3.12
      Timeout: 120
      MemorySize: 256
      Layers:
        - !Ref SharedLayer
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: '*'
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:ListTables
                - dynamodb:CreateTable
                - dynamodb:DescribeTable
              Resource: '*'
        - SQSSendMessagePolicy:
            QueueName: !GetAtt LeadPollDLQ.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/GOOGLE_SHEETS_CREDENTIALS'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/MOVINGCRM_ADMIN_PASSWORD'
      VpcConfig: !If
        - InVpc
        - SubnetIds: !Ref VpcSubnetIds
          SecurityGroupIds: !Ref VpcSecurityGroupIds
        - !Ref "AWS::NoValue"
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt LeadPollDLQ.Arn
      Environment:
        Variables:
          APP_ENV: !Ref Environment
          APP_SECRET: '{{resolve:ssm:/meta-webhook/APP_SECRET}}'
          COMMENTS_DETECTION_USER_TOKEN: '{{resolve:ssm:/meta-webhook/COMMENTS_DETECTION_USER_TOKEN}}'
          OPENAI_API_KEY: '{{resolve:ssm:/meta-webhook/OPENAI_API_KEY}}'
          PAGE_IDS: '{{resolve:ssm:/meta-webhook/PAGE_IDS}}'
          LEAD_POLL_LOOKBACK_MINUTES: '30'
          SMARTMOVING_PROVIDER_KEY: '{{resolve:ssm:/meta-webhook/SMARTMOVING_PROVIDER_KEY}}'
          SMARTMOVING_GORILLA_BRANCH_ID: '{{resolve:ssm:/meta-webhook/SMARTMOVING_GORILLA_BRANCH_ID}}'
          SMARTMOVING_WILSON_BRANCH_ID: '{{resolve:ssm:/meta-webhook/SMARTMOVING_WILSON_BRANCH_ID}}'
          HHG_NOTIFY_FROM: '{{resolve:ssm:/meta-webhook/HHG_NOTIFY_FROM}}'
          HHG_NOTIFY_TO: '{{resolve:ssm:/meta-webhook/HHG_NOTIFY_TO}}'
          GRANOT_API_ID: '{{resolve:ssm:/meta-webhook/GRANOT_API_ID}}'
          GRANOT_MOVER_REF: '{{resolve:ssm:/meta-webhook/GRANOT_MOVER_REF}}'
          BORAT_LEADS_SPREADSHEET_ID: '{{resolve:ssm:/meta-webhook/BORAT_LEADS_SPREADSHEET_ID}}'
          MOVING_CRM_API_SECRET: '{{resolve:ssm:/meta-webhook/MOVING_CRM_API_SECRET}}'
          MOVING_CRM_API_BASE_URL: !Sub '{{resolve:ssm:/moving-crm/${Environment}/API_BASE_URL}}'
          MOVING_CRM_ADMIN_EMAIL: 'admin@gorillamove.com'
          MOVING_CRM_ADMIN_PASSWORD_PARAM: '/meta-webhook/MOVINGCRM_ADMIN_PASSWORD'
      Events:
        LeadPollSchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(30 minutes)
            State: !If [IsProd, ENABLED, DISABLED]
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 900

  LeadPollErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: meta-webhook-lead-poll-errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref LeadPollFunction
