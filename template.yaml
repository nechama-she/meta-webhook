AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  MetaWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meta_webhook
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Policies:
        - AWSLambdaBasicExecutionRole
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          APP_ID: '{{resolve:ssm:/meta-webhook/APP_ID}}'
          APP_SECRET: '{{resolve:ssm:/meta-webhook/APP_SECRET}}'
          COMMENTS_DETECTION_USER_TOKEN: '{{resolve:ssm:/meta-webhook/COMMENTS_DETECTION_USER_TOKEN}}'
          ENABLE_OPENAI_ANSWER: '{{resolve:ssm:/meta-webhook/ENABLE_OPENAI_ANSWER}}'
          OPENAI_API_KEY: '{{resolve:ssm:/meta-webhook/OPENAI_API_KEY}}'
          PAGE_ACCESS_TOKEN: '{{resolve:ssm:/meta-webhook/PAGE_ACCESS_TOKEN}}'
          VERIFY_TOKEN: '{{resolve:ssm:/meta-webhook/VERIFY_TOKEN}}'
